<section id="team" class="alt">
    <div class="container">
        <div class="section-head center">
            <span class="eyebrow">Team</span>
            <h2>The people behind Medema Labs</h2>
        </div>
        <div class="team-grid">
            {% for person in site.people %}
            <div class="card team-card">
                <img src="/img/team/{{ person.pic }}.jpg" alt="Portrait of {{ person.name }}">
                <h3>{{ person.name }}</h3>
                <div class="role">{{ person.position }}</div>
                <div class="social-row" style="justify-content:center">
                    {% for network in person.social %}
                    <a href="{{ network.url }}" aria-label="{{ person.name }} on {{ network.title }}">
                        <svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V24h-4V8zm7.5 0h3.8v2.2h.05c.53-1 1.83-2.2 3.77-2.2 4.03 0 4.78 2.65 4.78 6.1V24h-4v-8.5c0-2-.04-4.6-2.8-4.6-2.8 0-3.23 2.2-3.23 4.45V24H8V8z"/></svg>
                    </a>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
