<nav class="site-nav">
    <div class="container">
        <a class="nav-brand" href="/">
            <img src="/img/logos/weblogoOnBlack.png" alt="{{ site.title }} logo">
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.getElementById('nav-links').classList.toggle('open')">&#9776;</button>
        <ul class="nav-links" id="nav-links">
            {% for item in site.nav %}
            <li><a href="{{ item.url }}">{{ item.label }}</a></li>
            {% endfor %}
            <li><a class="btn btn-primary" href="{{ site.cta.url }}">{{ site.cta.label }}</a></li>
        </ul>
    </div>
</nav>
